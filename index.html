<!DOCTYPE html>
<html>
<head>
    <title>Centennial Astra Control</title>
</head>
<body>
    <h1>Astra Dashboard</h1>
    <button onclick="callAstra()">Sipahi-R1 Telemetry</button>

    <script>
    async function callAstra() {
        const url = "https://jeee1og0349e.share.zrok.io/run/Architect/Sipahi_r1/telemetry";
        try {
            const response = await fetch(url);
            const data = await response.json();
            alert("Astra Response: " + JSON.stringify(data));
        } catch (err) {
            alert("Connection Error. Check your Termux status.");
        }
    }
    </script>
</body>
</html>
